name: iOS Tweak Build V4
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # ldid o'rnatish (imzolash xatosini tuzatadi)
          curl -L https://github.com/theos/ldid/releases/latest/download/ldid_macos_x86_64 -o ~/theos/bin/ldid
          chmod +x ~/theos/bin/ldid
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          mkdir -p ~/theos/sdks
          mv sdks-master/iPhoneOS16.5.sdk ~/theos/sdks/
          rm -rf sdks-master sdks.zip

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubwayMod-Dylib
          path: .theos/obj/debug/*.dylib
